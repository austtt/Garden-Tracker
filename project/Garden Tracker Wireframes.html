<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Tracker — Wireframes</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Caveat+Brush&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a1a; font-family: 'Caveat', cursive; }

  /* Phone shell */
  .phone {
    width: 280px;
    height: 560px;
    background: #f5f2ee;
    border-radius: 36px;
    border: 3px solid #333;
    overflow: hidden;
    position: relative;
    box-shadow: 4px 6px 0 #222;
  }
  .phone-notch {
    width: 80px; height: 18px;
    background: #333;
    border-radius: 0 0 12px 12px;
    margin: 0 auto;
    position: relative; z-index: 10;
  }
  .phone-screen {
    width: 100%; height: calc(100% - 18px);
    overflow: hidden;
    position: relative;
    background: #f5f2ee;
  }

  /* Sketchy primitives */
  .box { background: #e0dbd3; border: 2px solid #555; border-radius: 4px; }
  .box-dark { background: #3d5a3e; border: 2px solid #2a3e2b; border-radius: 4px; }
  .box-green { background: #c8d9c0; border: 2px solid #5a7a5b; border-radius: 4px; }
  .box-light { background: #ede9e3; border: 2px solid #aaa; border-radius: 4px; }
  .pill { border-radius: 999px; }
  .img-placeholder {
    background: repeating-linear-gradient(
      45deg, #d0ccc5, #d0ccc5 3px, #e0dbd3 3px, #e0dbd3 10px
    );
    border: 2px solid #999; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 11px; text-align: center; line-height: 1.3;
  }
  .img-placeholder-dark {
    background: repeating-linear-gradient(
      45deg, #3a4a3b, #3a4a3b 3px, #4a5e4b 3px, #4a5e4b 10px
    );
    border: 2px solid #666;
  }
  .label { font-size: 13px; color: #444; line-height: 1.2; }
  .label-sm { font-size: 11px; color: #666; }
  .label-lg { font-size: 16px; font-weight: 700; color: #222; }
  .label-green { color: #3d5a3e; }
  .label-white { color: #f5f2ee; }

  /* Status bar */
  .status-bar {
    height: 20px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
    font-size: 10px; color: #555;
    flex-shrink: 0;
  }

  /* Bottom nav */
  .bottom-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 52px;
    background: #f5f2ee;
    border-top: 2px solid #ccc;
    display: flex; align-items: center; justify-content: space-around;
    padding: 0 8px;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 9px; color: #888;
  }
  .nav-item.active { color: #3d5a3e; }
  .nav-icon {
    width: 20px; height: 20px;
    background: #ccc; border-radius: 4px;
    border: 1.5px solid #aaa;
  }
  .nav-icon.active { background: #c8d9c0; border-color: #5a7a5b; }

  /* FAB */
  .fab {
    position: absolute; bottom: 62px; right: 14px;
    width: 40px; height: 40px;
    background: #3d5a3e; border-radius: 50%;
    border: 2px solid #2a3e2b;
    display: flex; align-items: center; justify-content: center;
    color: #f5f2ee; font-size: 22px; font-weight: 700;
    box-shadow: 2px 2px 0 #2a3e2b;
  }

  /* Annotation */
  .annotation {
    position: absolute;
    font-size: 10px;
    color: #e05a2b;
    font-family: 'Caveat', cursive;
    pointer-events: none;
    white-space: nowrap;
  }
  .annotation::before { content: '← '; }
  .annotation.right::before { content: ''; }
  .annotation.right::after { content: ' →'; }

  /* Variation label */
  .variation-tag {
    display: inline-block;
    background: #3d5a3e; color: #f5f2ee;
    font-family: 'Caveat', cursive;
    font-size: 13px; font-weight: 700;
    padding: 2px 10px; border-radius: 4px;
    margin-bottom: 6px;
    border: 2px solid #2a3e2b;
  }
  .variation-note {
    font-family: 'Caveat', cursive;
    font-size: 13px; color: #888;
    margin-top: 4px;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { DCSection, DCArtboard, DesignCanvas: DCDesignCanvas } = window;

/* ── Shared primitives ── */
const Phone = ({ children }) => (
  <div className="phone">
    <div className="phone-notch"></div>
    <div className="phone-screen" style={{ display:'flex', flexDirection:'column' }}>
      {children}
    </div>
  </div>
);

const StatusBar = () => (
  <div className="status-bar">
    <span>9:41</span>
    <span>●●● WiFi ▮▮▮</span>
  </div>
);

const BottomNav = ({ active = 0 }) => {
  const items = ['Plants','Today','Identify','Dr.','More'];
  return (
    <div className="bottom-nav">
      {items.map((it, i) => (
        <div key={it} className={`nav-item ${i===active?'active':''}`}>
          <div className={`nav-icon ${i===active?'active':''}`}></div>
          <span>{it}</span>
        </div>
      ))}
    </div>
  );
};

const Pill = ({ label, active, style }) => (
  <div style={{
    display:'inline-flex', alignItems:'center',
    padding:'3px 10px', borderRadius:999,
    border: active ? '2px solid #3d5a3e' : '2px solid #bbb',
    background: active ? '#c8d9c0' : '#ede9e3',
    fontSize:11, color: active ? '#3d5a3e' : '#777',
    fontWeight: active ? 700 : 400,
    ...style
  }}>{label}</div>
);

const ImgBlock = ({ w, h, label, dark, style }) => (
  <div className={`img-placeholder ${dark?'img-placeholder-dark':''}`}
    style={{ width:w, height:h, ...style }}>
    {label && <span style={{color: dark ? '#9db39e':'#888'}}>{label}</span>}
  </div>
);

const Box = ({ w, h, style, children, green, dark, light }) => (
  <div className={`box${green?' box-green':''}${dark?' box-dark':''}${light?' box-light':''}`}
    style={{ width:w, height:h, display:'flex', alignItems:'center', justifyContent:'center', ...style }}>
    {children}
  </div>
);

const TextLine = ({ w, h=10, style }) => (
  <div style={{ width:w, height:h, background:'#ccc', borderRadius:3, ...style }}></div>
);

/* ══════════════════════════════════════
