<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garden Tracker — Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1c1c1c;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Caveat', cursive;
}
.phone {
  width: 320px; height: 640px;
  background: #f5f2ee; border-radius: 44px;
  border: 3px solid #333; overflow: hidden;
  position: relative;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6), 4px 6px 0 #111;
  flex-shrink: 0;
}
.phone-notch {
  width: 90px; height: 20px; background: #222;
  border-radius: 0 0 14px 14px; margin: 0 auto;
  position: relative; z-index: 10; flex-shrink: 0;
}
.screen {
  width: 100%; height: calc(100% - 20px);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative; background: #f5f2ee;
}
.status-bar {
  height: 22px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; font-size: 11px; color: #555;
}
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 56px; background: #f5f2ee;
  border-top: 2px solid #ddd;
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 4px 6px; z-index: 20;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 9px; color: #aaa; cursor: pointer;
  padding: 4px 6px; border-radius: 8px; min-width: 44px;
  transition: background 0.15s; position: relative;
}
.nav-item:active { background: rgba(0,0,0,0.05); }
.nav-item.active { color: #3d5a3e; }
.nav-icon {
  width: 22px; height: 22px; background: #ddd; border-radius: 5px;
  border: 1.5px solid #bbb;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.nav-icon.active { background: #c8d9c0; border-color: #5a7a5b; }

/* More popup */
.more-popup {
  position: absolute; bottom: 54px; right: -4px;
  background: #f5f2ee; border: 2px solid #ccc; border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  overflow: hidden; z-index: 100; min-width: 140px;
}
.more-popup-item {
  padding: 10px 14px; font-size: 13px; color: #333; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid #eee;
  font-family: 'Caveat', cursive;
}
.more-popup-item:last-child { border-bottom: none; }
.more-popup-item:hover { background: #ede9e3; }

/* Shared primitives */
.img-block {
  background: repeating-linear-gradient(45deg,#ccc8c0,#ccc8c0 3px,#dedad3 3px,#dedad3 10px);
  border: 2px solid #aaa; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  color: #999; font-size: 11px; text-align: center; line-height: 1.3; flex-shrink: 0;
}
.img-block.dark {
  background: repeating-linear-gradient(45deg,#3a4a3b,#3a4a3b 3px,#4a5e4b 3px,#4a5e4b 10px);
  border-color: #666;
}
.pill {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 999px;
  border: 2px solid #5a7a5b; background: #c8d9c0;
  font-size: 10px; color: #3d5a3e; font-weight: 700; white-space: nowrap;
}
.btn-primary {
  width: 100%; height: 44px; border-radius: 999px;
  background: #3d5a3e; border: 2px solid #2a3e2b;
  display: flex; align-items: center; justify-content: center;
  color: #f5f2ee; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: 'Caveat', cursive;
  box-shadow: 2px 2px 0 #2a3e2b;
}
.btn-primary:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 #2a3e2b; }
.btn-outline {
  width: 100%; height: 44px; border-radius: 999px;
  background: transparent; border: 2px solid #bbb;
  display: flex; align-items: center; justify-content: center;
  color: #666; font-size: 15px; cursor: pointer; font-family: 'Caveat', cursive;
}
.fab {
  position: absolute; bottom: 66px; right: 16px;
  width: 44px; height: 44px; border-radius: 22px;
  background: #3d5a3e; border: 2px solid #2a3e2b;
  display: flex; align-items: center; justify-content: center;
  color: #f5f2ee; font-size: 26px; font-weight: 700;
  cursor: pointer; box-shadow: 3px 3px 0 #2a3e2b; z-index: 15;
}
.card {
  background: #ede9e3; border: 2px solid #d0cbc3; border-radius: 12px; overflow: hidden;
}
.scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; }
.scroll-area::-webkit-scrollbar { width: 0; }
.back-btn {
  width: 28px; height: 28px; border-radius: 14px;
  background: rgba(0,0,0,0.08); border: 1.5px solid #ccc;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 13px; color: #555; flex-shrink: 0;
}
.upload-btn {
  border: 2px dashed #5a7a5b; border-radius: 10px;
  background: #e8f0e5; padding: 10px;
  display: flex; align-items: center; justify-content: center;
  gap: 6px; cursor: pointer; font-family: 'Caveat', cursive;
}
.field-row {
  background: #ede9e3; border: 2px solid #ccc; border-radius: 10px;
  padding: 10px 12px; display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.field-label { font-size: 12px; color: #888; }
.field-value { font-size: 14px; color: #3d5a3e; font-weight: 700; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ── Shared ── */
const StatusBar = () => (
  <div className="status-bar"><span>9:41</span><span>●●● ▮▮▮</span></div>
);

const BottomNav = ({ active, go, moreOpen, setMoreOpen }) => {
  const tabs = [
    { label:'Plants',    icon:'🌿', screen:'plants' },
    { label:'Schedule',  icon:'🗓', screen:'schedule' },
    { label:'Scan',      icon:'📷', screen:'identify' },
    { label:'Dr.',       icon:'🩺', screen:'dr' },
    { label:'More',      icon:'⋯',  screen:null },
  ];
  return (
    <div className="bottom-nav">
      {tabs.map((t, i) => (
        <div key={t.label}
          className={`nav-item${active===i?' active':''}`}
          onClick={() => {
            if (t.screen) { setMoreOpen(false); go(t.screen); }
            else setMoreOpen(o => !o);
          }}>
          <div className={`nav-icon${active===i?' active':''}`}>{t.icon}</div>
          {t.label}
          {/* More popup */}
          {i===4 && moreOpen && (
            <div className="more-popup" onClick={e => e.stopPropagation()}>
              <div className="more-popup-item" onClick={() => { setMoreOpen(false); go('light'); }}>
                💡 Light Meter
              </div>
              <div className="more-popup-item" onClick={() => { setMoreOpen(false); go('settings'); }}>
                ⚙️ Settings
              </div>
            </div>
          )}
        </div>
      ))}
    </div>
  );
};

const ImgBlock = ({ w, h, label, dark, style }) => (
  <div className={`img-block${dark?' dark':''}`}
    style={{ width: w||'100%', height: h, flexShrink:0, borderRadius:6, ...style }}>
    {label && <span>{label}</span>}
  </div>
);

/* ─────────────────────────────────
   ONBOARDING V1
───────────────────────────────── */
const OnboardingScreen = ({ go }) => (
  <div className="screen">
    <ImgBlock h={260} label="hero plant photo" style={{ borderRadius:0, border:'none', borderBottom:'2px solid #bbb' }} />
    <div style={{ flex:1, padding:'16px 20px', display:'flex', flexDirection:'column', justifyContent:'space-between' }}>
      <div>
        <div style={{ fontSize:24, fontWeight:700, color:'#3d5a3e', marginBottom:4 }}>🌿 Garden Tracker</div>
        <div style={{ fontSize:14, color:'#666', marginBottom:14 }}>Care for every plant — indoors &amp; out</div>
        {['🗓 Watering & care reminders','🌤 Weather-smart scheduling','📷 Identify plants instantly','📒 Growth journal & log'].map(f => (
          <div key={f} style={{ fontSize:13, color:'#555', marginBottom:5 }}>{f}</div>
        ))}
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        <div className="btn-primary" onClick={() => go('onboarding-wizard')}>Get Started</div>
        <div style={{ textAlign:'center', fontSize:12, color:'#aaa' }}>
          Already have an account? <span style={{ color:'#3d5a3e', textDecoration:'underline', cursor:'pointer' }}>Sign in</span>
        </div>
      </div>
    </div>
  </div>
);

/* ─────────────────────────────────
   ONBOARDING WIZARD
───────────────────────────────── */
const OnboardingWizard = ({ go }) => {
  const [step, setStep] = useState(0);
  const [selected, setSelected] = useState([]);
  const steps = [
    { title:'Where are your plants?', sub:'Select all that apply', options:['🛋 Living Room','🛏 Bedroom','🌳 Garden / Outdoors','🪴 Balcony','🍳 Kitchen','🏢 Office'] },
    { title:'Set your location', sub:'Used for weather-smart watering schedules', isLocation:true },
    { title:'Add your first plant', sub:'Take a photo or search by name', isPlant:true },
  ];
  const cur = steps[step];
  const next = () => { if (step < steps.length-1) { setStep(s=>s+1); setSelected([]); } else go('plants'); };
  return (
    <div className="screen">
      <div style={{ padding:'10px 20px 0', display:'flex', gap:6 }}>
        {steps.map((_,i) => <div key={i} style={{ flex:1, height:4, borderRadius:2, background:i<=step?'#3d5a3e':'#ddd' }}></div>)}
      </div>
      <div style={{ padding:'14px 20px 0' }}>
        <div style={{ fontSize:20, fontWeight:700, color:'#3d5a3e', marginBottom:2 }}>{cur.title}</div>
        <div style={{ fontSize:13, color:'#888' }}>{cur.sub}</div>
      </div>
      <div className="scroll-area" style={{ padding:'12px 20px' }}>
        {cur.options && cur.options.map(o => {
          const on = selected.includes(o);
          return (
            <div key={o} onClick={() => setSelected(s => on ? s.filter(x=>x!==o) : [...s,o])}
              style={{ padding:'10px 12px', borderRadius:10, marginBottom:8, cursor:'pointer', fontSize:14,
                border: on?'2px solid #3d5a3e':'2px solid #ccc', background: on?'#c8d9c0':'#ede9e3',
                display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              {o}
              <div style={{ width:18, height:18, borderRadius:4, border: on?'2px solid #3d5a3e':'2px solid #bbb',
                background: on?'#3d5a3e':'transparent', display:'flex', alignItems:'center', justifyContent:'center',
                color:'#fff', fontSize:11 }}>{on?'✓':''}</div>
            </div>
          );
        })}
        {cur.isLocation && (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ background:'#ede9e3', border:'2px solid #ccc', borderRadius:10, padding:'10px 12px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontSize:14, color:'#555' }}>City / State</span>
              <span style={{ fontSize:13, color:'#3d5a3e', fontWeight:700 }}>Austin, TX ✏️</span>
            </div>
            <div style={{ background:'#c8d9c0', border:'2px solid #5a7a5b', borderRadius:10, padding:'10px 12px' }}>
              <div style={{ fontSize:13, fontWeight:700, color:'#3d5a3e', marginBottom:4 }}>🌤 Current weather</div>
              <div style={{ fontSize:13, color:'#5a7a5b' }}>Austin, TX · 72°F · Partly Cloudy</div>
              <div style={{ fontSize:11, color:'#5a7a5b', marginTop:2 }}>Watering schedules will adapt automatically</div>
            </div>
            <div style={{ background:'#ede9e3', border:'2px solid #ccc', borderRadius:10, padding:'10px 12px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontSize:13 }}>Smart watering based on weather</span>
              <div style={{ width:32, height:18, background:'#3d5a3e', borderRadius:9, border:'2px solid #2a3e2b' }}></div>
            </div>
          </div>
        )}
        {cur.isPlant && (
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            <div style={{ height:130, borderRadius:14, border:'3px dashed #5a7a5b', background:'#e8f0e5',
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:6, cursor:'pointer' }}
              onClick={() => go('new-plant-setup')}>
              <span style={{ fontSize:36 }}>📷</span>
              <span style={{ fontSize:14, color:'#3d5a3e', fontWeight:700 }}>Take a photo to identify</span>
            </div>
            <div style={{ textAlign:'center', fontSize:12, color:'#aaa' }}>— or search by name —</div>
            <div style={{ background:'#ede9e3', border:'2px solid #ccc', borderRadius:10, padding:'10px 12px', fontSize:13, color:'#aaa' }}>Search plants…</div>
            <div style={{ display:'flex', gap:8 }}>
              {['Monstera','Pothos','Snake Plant'].map(p => (
                <div key={p} style={{ flex:1, borderRadius:10, overflow:'hidden', border:'2px solid #bbb', cursor:'pointer' }} onClick={() => go('new-plant-setup')}>
                  <ImgBlock h={60} style={{ borderRadius:0, border:'none' }} />
                  <div style={{ padding:'3px 6px', fontSize:10, fontWeight:700, color:'#444' }}>{p}</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
      <div style={{ padding:'0 20px 12px', display:'flex', gap:8 }}>
        {step > 0 ? <div className="btn-outline" style={{ flex:1 }} onClick={() => setStep(s=>s-1)}>Back</div>
                  : <div className="btn-outline" style={{ flex:1 }} onClick={next}>Skip</div>}
        <div className="btn-primary" style={{ flex:2 }} onClick={next}>{step===steps.length-1?'Start Tracking →':'Next →'}</div>
      </div>
    </div>
  );
};

/* ─────────────────────────────────
   MY PLANTS
───────────────────────────────── */
const MyPlantsScreen = ({ go, moreOpen, setMoreOpen }) => {
  const rooms = [
    { room:'🛋 Living Room', count:3, plants:['Monstera','Pothos','ZZ Plant'] },
    { room:'🌳 Garden', count:4, plants:['Lavender','Rosemary','Tomatoes','Basil'] },
    { room:'🛏 Bedroom', count:2, plants:['Snake Plant','Peace Lily'] },
  ];
  return (
    <div className="screen" onClick={() => setMoreOpen(false)}>
      <StatusBar />
      <div style={{ padding:'4px 16px 0', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:22, fontWeight:700, color:'#222' }}>My Plants</span>
        <div style={{ width:28, height:28, background:'#ccc', borderRadius:14, border:'2px solid #bbb', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13 }}>👤</div>
      </div>
      <div style={{ margin:'6px 16px 2px', padding:'5px 10px', background:'#c8d9c0', borderRadius:8, border:'2px solid #5a7a5b', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:11, color:'#3d5a3e' }}>🌤 Austin, TX · 72°F · Partly Cloudy</span>
        <span style={{ fontSize:11, color:'#5a7a5b', fontWeight:700 }}>Good watering day</span>
      </div>
      <div className="scroll-area" style={{ paddingBottom:66 }}>
        {rooms.map(s => (
          <div key={s.room} style={{ marginTop:10 }}>
            <div style={{ padding:'0 16px 4px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
              <span style={{ fontSize:14, fontWeight:700, color:'#444' }}>{s.room}</span>
              <span style={{ fontSize:11, color:'#aaa' }}>{s.count} plants</span>
            </div>
            <div style={{ padding:'0 16px', display:'flex', gap:8, overflowX:'auto' }}>
              {s.plants.map(p => (
                <div key={p} style={{ width:88, flexShrink:0, borderRadius:12, overflow:'hidden', border:'2px solid #ccc', background:'#ede9e3', cursor:'pointer' }}
                  onClick={() => go('detail')}>
                  <ImgBlock h={68} style={{ borderRadius:0, border:'none' }} />
                  <div style={{ padding:'4px 6px', fontSize:11, fontWeight:700, color:'#333' }}>{p}</div>
                  {p==='Monstera' && <div style={{ padding:'0 6px 4px' }}><span style={{ fontSize:9, background:'#e8c4b8', color:'#8b3a2a', padding:'1px 5px', borderRadius:4, border:'1px solid #c88070' }}>2d late</span></div>}
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
      <div className="fab" onClick={() => go('identify')}>+</div>
      <BottomNav active={0} go={go} moreOpen={moreOpen} setMoreOpen={setMoreOpen} />
    </div>
  );
};

/* ─────────────────────────────────
   SCHEDULE SCREEN
───────────────────────────────── */
const ScheduleScreen = ({ go, moreOpen, setMoreOpen }) => {
  const weeks = [
    {
      label: 'This week',
      days: [
        { date:'Mon Apr 28', tasks:[{ plant:'Monstera', icon:'💧', type:'Water', urgent:true }, { plant:'Pothos', icon:'💧', type:'Water' }] },
        { date:'Tue Apr 29', tasks:[{ plant:'Lavender', icon:'✂️', type:'Prune' }] },
        { date:'Thu May 1',  tasks:[{ plant:'Snake Plant', icon:'💧', type:'Water' }, { plant:'Basil', icon:'💧', type:'Water' }] },
        { date:'Sat May 3',  tasks:[{ plant:'Monstera', icon:'🌿', type:'Fertilize' }, { plant:'Tomatoes', icon:'🐛', type:'Pest check' }] },
      ]
    },
    {
      label: 'Next week',
      days: [
        { date:'Mon May 5',  tasks:[{ plant:'Pothos', icon:'💧', type:'Water' }, { plant:'ZZ Plant', icon:'💧', type:'Water' }] },
        { date:'Wed May 7',  tasks:[{ plant:'Rosemary', icon:'✂️', type:'Prune' }] },
        { date:'Fri May 9',  tasks:[{ plant:'All outdoor', icon:'🌿', type:'Fertilize' }] },
      ]
    },
    {
      label: 'Later this month',
      days: [
        { date:'May 12', tasks:[{ plant:'Monstera', icon:'💧', type:'Water' }, { plant:'Peace Lily', icon:'💧', type:'Water' }] },
        { date:'May 15', tasks:[{ plant:'Tomatoes', icon:'🐛', type:'Pest treatment' }] },
        { date:'May 20', tasks:[{ plant:'Snake Plant', icon:'🔄', type:'Repot' }] },
        { date:'May 25', tasks:[{ plant:'All plants', icon:'🌿', type:'Monthly fertilize' }] },
      ]
    }
  ];
  const typeColor = { '💧':'#b8d4e8', '🌿':'#c8d9c0', '✂️':'#e8d8c0', '🐛':'#e8c4b8', '🔄':'#d8c8e8' };
  const typeBorder = { '💧':'#6a9ab8', '🌿':'#5a7a5b', '✂️':'#a87a4a', '🐛':'#c88070', '🔄':'#8878a8' };

  return (
    <div className="screen" onClick={() => setMoreOpen(false)}>
      <StatusBar />
      <div style={{ padding:'4px 16px 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span style={{ fontSize:22, fontWeight:700, color:'#222' }}>Schedule</span>
        <div style={{ display:'flex', gap:6 }}>
          {['💧','🌿','✂️','🐛'].map(f => (
            <div key={f} style={{ width:26, height:26, borderRadius:13, background:'#ede9e3', border:'1.5px solid #ccc', display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, cursor:'pointer' }}>{f}</div>
          ))}
        </div>
      </div>
      <div className="scroll-area" style={{ padding:'0 16px', paddingBottom:66 }}>
        {weeks.map(w => (
          <div key={w.label} style={{ marginBottom:14 }}>
            <div style={{ fontSize:13, fontWeight:700, color:'#888', marginBottom:8, textTransform:'uppercase', letterSpacing:'0.04em' }}>{w.label}</div>
            {w.days.map(d => (
              <div key={d.date} style={{ marginBottom:10 }}>
                <div style={{ fontSize:12, color:'#aaa', marginBottom:4 }}>{d.date}</div>
                {d.tasks.map((t, i) => (
                  <div key={i} style={{
                    display:'flex', alignItems:'center', gap:10, padding:'8px 10px', marginBottom:4,
                    borderRadius:10, border:`2px solid ${typeBorder[t.icon]||'#ccc'}`,
                    background: typeColor[t.icon]||'#ede9e3',
                    opacity: t.urgent ? 1 : 0.9
                  }}>
                    <div style={{ width:30, height:30, borderRadius:15, background:'rgba(255,255,255,0.6)', border:`1.5px solid ${typeBorder[t.icon]||'#ccc'}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:15, flexShrink:0 }}>{t.icon}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:700, color:'#333' }}>{t.type}</div>
                      <div style={{ fontSize:11, color:'#666' }}>{t.plant}</div>
                    </div>
                    {t.urgent && <span style={{ fontSize:9, background:'#c55', color:'#fff', padding:'1px 5px', borderRadius:4 }}>Late</span>}
                    <div style={{ width:20, height:20, borderRadius:10, border:'2px solid rgba(0,0,0,0.2)', flexShrink:0 }}></div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        ))}
      </div>
      <BottomNav active={1} go={go} moreOpen={moreOpen} setMoreOpen={setMoreOpen} />
    </div>
  );
};

/* ─────────────────────────────────
   PLANT DETAIL
───────────────────────────────── */
const PlantDetailScreen = ({ go, moreOpen, setMoreOpen }) => {
  const [heroUploaded, setHeroUploaded] = useState(false);
  const [progressPhotos, setProgressPhotos] = useState([
    { label:'Feb 10', note:'New leaf emerging' },
    { label:'Mar 22', note:'3 new leaves!' },
  ]);
  const heroRef = useRef();
  const progressRef = useRef();

  const handleHeroUpload = (e) => { if (e.target.files && e.target.files[0]) setHeroUploaded(true); };
  const handleProgressUpload = (e) => {

    <div className="scroll-area" style={{ padding:'0 16px', paddingBottom:66, display:'flex', flexDirection:'column', gap:12 }}>
      <div style={{ background:'#c8d9c0', border:'2px solid #5a7a5b', borderRadius:14, padding:'12px 14px' }}>
        <div style={{ fontSize:13, fontWeight:700, color:'#3d5a3e', marginBottom:8 }}>📍 Location &amp; Weather</div>
        <div style={{ background:'#f5f2ee', border:'2px solid #bbb', borderRadius:10, padding:'8px 12px', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center', cursor:'pointer' }}>
          <span style={{ fontSize:14 }}>Austin, TX</span>
          <span style={{ fontSize:12, color:'#5a7a5b' }}>Edit ›</span>
        </div>
        <div style={{ background:'#3d5a3e', borderRadius:8, padding:'6px 10px', fontSize:12, color:'#fff', textAlign:'center', marginBottom:8 }}>🌤 72°F · Partly Cloudy · Good watering day</div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:12, color:'#5a7a5b' }}>Smart watering based on weather</span>
          <div style={{ width:32, height:18, background:'#3d5a3e', borderRadius:9, border:'2px solid #2a3e2b' }}></div>
        </div>
      </div>
      <div style={{ background:'#ede9e3', border:'2px solid #ccc', borderRadius:14, padding:'12px 14px' }}>
        <div style={{ fontSize:13, fontWeight:700, color:'#444', marginBottom:8 }}>☁️ Google Drive Backup</div>
        <div style={{ background:'#e8c4b8', border:'2px solid #c88070', borderRadius:10, padding:'8px 12px', marginBottom:10, fontSize:12, color:'#8b3a2a' }}>⚠️ Not connected — your data isn't backed up</div>
        <div style={{ background:'#3d5a3e', borderRadius:10, padding:'10px', textAlign:'center', fontSize:14, color:'#fff', fontWeight:700, cursor:'pointer', fontFamily:'Caveat,cursive' }}>Connect Google Drive</div>
        <div style={{ marginTop:8, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          <span style={{ fontSize:12, color:'#888' }}>Auto-backup photos</span>
          <div style={{ width:32, height:18, background:'#ccc', borderRadius:9, border:'2px solid #bbb' }}></div>
        </div>
      </div>
      <div style={{ background:'#ede9e3', border:'2px solid #ccc', borderRadius:14, padding:'12px 14px' }}>

    <BottomNav active={-1} go={go} moreOpen={moreOpen} setMoreOpen={setMoreOpen} />

);

/* ─────────────────────────────────
   ROOT
───────────────────────────────── */
const SCREEN_LABELS = {
  onboarding:'Onboarding', 'onboarding-wizard':'Onboarding Wizard',
  plants:'My Plants', schedule:'Schedule', detail:'Plant Detail',
  identify:'Identify', 'new-plant-setup':'New Plant Setup',
  dr:'Dr. Plant', light:'Light Meter', settings:'Settings',
};

const App = () => {
  const [screen, setScreen] = useState('onboarding');
  const [moreOpen, setMoreOpen] = useState(false);
  const go = (s) => { setScreen(s); setMoreOpen(false); };

  const sharedProps = { go, moreOpen, setMoreOpen };

  const renderScreen = () => {
    switch(screen) {
      case 'onboarding':        return <OnboardingScreen go={go} />;
      case 'onboarding-wizard': return <OnboardingWizard go={go} />;
      case 'plants':            return <MyPlantsScreen {...sharedProps} />;
      case 'schedule':          return <ScheduleScreen {...sharedProps} />;
      case 'detail':            return <PlantDetailScreen {...sharedProps} />;
      case 'identify':          return <IdentifyScreen go={go} />;
      case 'new-plant-setup':   return <NewPlantSetupScreen go={go} />;
      case 'dr':                return <DrScreen {...sharedProps} />;
      case 'light':             return <LightMeterScreen go={go} />;
      case 'settings':          return <SettingsScreen {...sharedProps} />;
      default:                  return <MyPlantsScreen {...sharedProps} />;
    }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16, padding:'32px 16px' }}>
      <div style={{ color:'#666', fontSize:13, fontFamily:'Caveat,cursive' }}>{SCREEN_LABELS[screen]||screen}</div>
      <div className="phone">
        <div className="phone-notch"></div>
        {renderScreen()}
      </div>
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'center', maxWidth:400 }}>
        {Object.entries(SCREEN_LABELS).map(([k,v]) => (
          <div key={k} onClick={() => go(k)}
            style={{ padding:'4px 10px', borderRadius:999, cursor:'pointer',
              background: screen===k?'#3d5a3e':'#2e2e2e',
              color: screen===k?'#f5f2ee':'#888',
              border:`1.5px solid ${screen===k?'#5a7a5b':'#444'}`,
              fontSize:12, fontFamily:'Caveat,cursive' }}>{v}</div>
        ))}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
