/* ══════════════════════════════════════════════════════

   from https://console.cloud.google.com — leave as
   'DEMO' to run in prototype/simulation mode.
══════════════════════════════════════════════════════ */
const GOOGLE_CLIENT_ID = 'DEMO'; // ← swap in real client ID for production
const DRIVE_SCOPES = 'profile email https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE_NAME = 'garden-tracker-plants.json';

/* ══════════════════════════════════════════════════════
   DRIVE APP DATA SERVICE
   Reads & writes plant data to the hidden Drive appdata
   folder so it never appears in the user's My Drive.
══════════════════════════════════════════════════════ */
const DriveService = {
  _token: null,

  setToken(token) { this._token = token; },
  clearToken() { this._token = null; },

  async _headers() {
    return { Authorization: `Bearer ${this._token}`, 'Content-Type': 'application/json' };
  },

  /* Find the plant file in appdata, returns fileId or null */
  async findFile() {
    const res = await fetch(
      "https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D%27" +
      encodeURIComponent(DRIVE_FILE_NAME) + "'&fields=files(id,name,modifiedTime)",
      { headers: await this._headers() }
    );
    if (!res.ok) throw new Error('Drive list failed: ' + res.status);
    const data = await res.json();
    return data.files?.[0] || null;
  },

  /* Read plant data from appdata — returns parsed object or null */
  async readPlants() {
    const file = await this.findFile();
    if (!file) return null;
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`,
      { headers: await this._headers() }
    );
    if (!res.ok) throw new Error('Drive read failed: ' + res.status);
    return await res.json();
  },

  /* Write (create or update) plant data to appdata */
  async writePlants(data) {
    const body = JSON.stringify(data);
    const file = await this.findFile();

    if (!file) {
      // Create — two-step: metadata then content
      const metaRes = await fetch('https://www.googleapis.com/drive/v3/files', {
        method: 'POST',
        headers: await this._headers(),
        body: JSON.stringify({ name: DRIVE_FILE_NAME, parents: ['appDataFolder'] })
      });
      if (!metaRes.ok) throw new Error('Drive create failed');
      const meta = await metaRes.json();
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${meta.id}?uploadType=media`, {
        method: 'PATCH',
        headers: { ...(await this._headers()), 'Content-Type': 'application/json' },
        body
      });
    } else {
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${file.id}?uploadType=media`, {
        method: 'PATCH',
        headers: { ...(await this._headers()), 'Content-Type': 'application/json' },
        body
      });
    }
  },

  /* Revoke the access token (full sign-out) */
  async revokeToken() {
    if (!this._token) return;
    await fetch(`https://oauth2.googleapis.com/revoke?token=${this._token}`, { method: 'POST' });
    this.clearToken();
  },

  /* Revoke just drive scope — user stays signed in, Drive unlinked */
  async unlinkDrive() {
    await this.revokeToken(); // In practice would use a scoped revoke; same endpoint for demo
  }
};

/* ══════════════════════════════════
   OAUTH HELPER — wraps GSI or falls back to demo sim
══════════════════════════════════ */
const Auth = {
  _tokenClient: null,

  /** Returns Promise<{accessToken, userInfo}> */
  signIn() {
    return new Promise((resolve, reject) => {
      // Demo simulation mode
      if (GOOGLE_CLIENT_ID === 'DEMO' || !window.google?.accounts) {
        setTimeout(() => resolve({
          accessToken: 'demo-token-' + Date.now(),
          userInfo: { name: 'Alex Johnson', email: 'alex.johnson@gmail.com', avatar: 'AJ' }
        }), 1200);
        return;
      }

      // Real GSI flow
      if (!this._tokenClient) {
        this._tokenClient = window.google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: DRIVE_SCOPES,
          callback: () => {} // set per-request below
        });
      }

      this._tokenClient.callback = async (resp) => {
        if (resp.error) { reject(new Error(resp.error)); return; }
        try {
          const infoRes = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { Authorization: `Bearer ${resp.access_token}` }
          });
          const info = await infoRes.json();
          resolve({
            accessToken: resp.access_token,
            userInfo: {
              name: info.name, email: info.email,
              avatar: (info.given_name?.[0] || '') + (info.family_name?.[0] || ''),
              picture: info.picture
            }
          });
        } catch(e) { reject(e); }
      };
      this._tokenClient.requestAccessToken({ prompt: 'consent' });
    });
  },

  async signOut(token) {
    if (GOOGLE_CLIENT_ID !== 'DEMO' && window.google?.accounts) {
      window.google.accounts.oauth2.revoke(token, () => {});
    }
  }
};

/* ══════════════════════════════════
   HOOKS
══════════════════════════════════ */
function useOnline() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);
  return online;
}

/* ══════════════════════════════════
   GOOGLE SIGN-IN SCREEN
   Uses real GSI in production, simulates in demo mode
══════════════════════════════════ */
const GoogleSignInScreen = ({ go, onAuth, mode }) => {
  const { t, d } = useT();
  const [phase, setPhase] = useState('idle'); // idle | connecting | success | error
  const [errorMsg, setErrorMsg] = useState('');
  const online = useOnline();

  const handleGoogle = async () => {
    if (!online) { setErrorMsg('No internet connection. Please connect and try again.'); setPhase('error'); return; }
    setPhase('connecting');
    setErrorMsg('');
    try {
      const { accessToken, userInfo } = await Auth.signIn();
      DriveService.setToken(accessToken);
      const user = { ...userInfo, accessToken, driveConnected: true };
      localStorage.setItem('gt_user', JSON.stringify({ ...user, accessToken: '__stored__' }));
      // accessToken stored only in memory (DriveService), not in localStorage for security
      onAuth(user);
      setPhase('success');
      setTimeout(() => go(mode === 'signin' ? 'plants-loading' : 'onboarding-wizard'), 600);
    } catch(e) {
      setPhase('error');
      setErrorMsg(e.message === 'popup_closed_by_user' ? 'Sign-in cancelled.' : 'Sign-in failed — please try again.');
    }
  };

  return (
    <div className="screen" style={{ background:t.bg, fontFamily:t.font, display:'flex', flexDirection:'column' }}>
      <div style={{ height:180, flexShrink:0, position:'relative', overflow:'hidden' }}>

        <div style={{ position:'absolute', inset:0, background:`linear-gradient(to bottom, transparent 50%, ${t.bg} 100%)` }}></div>
      </div>

      <div style={{ flex:1, padding:`0 24px ${d.p(24)}px`, display:'flex', flexDirection:'column', gap:14 }}>
        <div>
          <div style={{ fontSize:d.fs(22), fontWeight:700, color:t.accent, marginBottom:4 }}>
            {mode==='signin' ? 'Welcome back 🌿' : 'Create your account'}
          </div>
          <div style={{ fontSize:13, color:t.subtext, lineHeight:1.5 }}>
            {mode==='signin'
              ? 'Sign in to access your plants, schedules and Google Drive backup.'
              : 'Your account keeps your garden data safe and synced across devices.'}
          </div>
        </div>

        {/* Scopes transparency */}
        <div style={{ background:t.surface, border:`2px solid ${t.border}`, borderRadius:t.radius, padding:'10px 12px' }}>

/* ══════════════════════════════════
   PLANTS LOADING SCREEN
   Shows skeleton + orchestrates Drive restore flow
══════════════════════════════════ */
const PlantsLoadingScreen = ({ go, user, onRestoreComplete }) => {
  const { t, d } = useT();
  const online = useOnline();
  const [restoreStage, setRestoreStage] = useState(null); // null | 'connecting…' | 'reading…' etc
  const [driveData, setDriveData] = useState(null);      // data found on Drive
  const [showModal, setShowModal] = useState(false);
  const [done, setDone] = useState(false);

  useEffect(() => {
    let cancelled = false;
    async function load() {
      if (!online || !user?.driveConnected) {
        // No Drive — go straight to plants
        setTimeout(() => { if (!cancelled) go('plants'); }, 900);
        return;
      }
      setRestoreStage('Connecting to Drive…');
      await delay(600);
      if (cancelled) return;
      setRestoreStage('Reading plant data…');
      try {
        // In demo mode, simulate finding existing data
        let found = null;
        if (GOOGLE_CLIENT_ID === 'DEMO') {
          await delay(700);
          // Simulate: 50% chance of finding existing Drive data (for demo)
          const hasDriveData = !localStorage.getItem('gt_drive_fresh');
          if (hasDriveData) {
            found = {
              plants: [
                { name:'Monstera deliciosa' },
                { name:'Pothos' },
                { name:'Snake Plant' },
                { name:'Lavender' },
                { name:'Basil' },
              ],
              savedAt: new Date(Date.now() - 86400000 * 3).toISOString()
            };
          }
        } else {
          found = await DriveService.readPlants();
        }

        if (cancelled) return;
        setRestoreStage(null);

        if (found && found.plants?.length > 0) {
          setDriveData(found);
          setShowModal(true);
        } else {
          go('plants');
        }
      } catch(e) {
        if (!cancelled) {
          console.warn('Drive read failed:', e);
          go('plants'); // Offline/error fallback
        }
      }
    }
    load();
    return () => { cancelled = true; };
  }, []);

  const handleRestore = async () => {
    setShowModal(false);
    setRestoreStage('Restoring plants…');
    await delay(600);
    setRestoreStage('Done!');
    await delay(500);
    localStorage.setItem('gt_drive_fresh', '1');
    onRestoreComplete && onRestoreComplete(driveData);
    go('plants');
  };

  const handleKeepLocal = () => {
    setShowModal(false);
    localStorage.setItem('gt_drive_fresh', '1');
    go('plants');
  };

  return (
    <div className="screen" style={{ background:t.bg, fontFamily:t.font, position:'relative' }}>
      <StatusBar />
      {/* Skeleton UI */}
      <div style={{ padding:`4px 16px 0`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <Skeleton w={100} h={22} r={6} />
        <Skeleton w={28} h={28} r={14} />
      </div>
      <div style={{ margin:`6px 16px 2px`, height:34, borderRadius:8 }}><Skeleton h={34} r={8} /></div>

      {[1,2,3].map(i => (
        <div key={i} style={{ marginTop:14 }}>
          <div style={{ padding:'0 16px 6px', display:'flex', justifyContent:'space-between' }}>
            <Skeleton w={90} h={14} />
            <Skeleton w={40} h={11} />
          </div>
          <div style={{ padding:'0 16px', display:'flex', gap:10, overflowX:'hidden' }}>
            {[1,2,3].map(j => (
              <div key={j} style={{ width:88, flexShrink:0, borderRadius:t.radius, overflow:'hidden', border:`2px solid ${t.border}` }}>
                <Skeleton h={68} r={0} />
                <div style={{ padding:'5px 6px' }}><Skeleton w={60} h={11} /></div>
              </div>
            ))}
          </div>
        </div>
      ))}

      {restoreStage && <DriveRestoreProgress stage={restoreStage} />}
      {showModal && (
        <RestoreModal
          driveData={driveData}
          onRestore={handleRestore}
          onKeepLocal={handleKeepLocal}
        />
      )}
    </div>
  );
};

const LUX_LEVELS = [
  { max:50,   label:'Dark',           sub:'Very little light', pct:5,  color:'#6a7a6a', suitable:'Cast iron plant, ZZ Plant' },
  { max:200,  label:'Low Light',      sub:'Shade tolerant',    pct:22, color:'#5a8a5a', suitable:'Pothos, Snake Plant, Peace Lily' },
  { max:1000, label:'Indirect Light', sub:'Bright room',       pct:45, color:'#4a9a4a', suitable:'Monstera, Fiddle Leaf, Philodendron' },
  { max:5000, label:'Part Sun',       sub:'A few hours sun',   pct:68, color:'#7ab83a', suitable:'Herbs, succulents, flowering plants' },
  { max:20000,label:'Bright Sun',     sub:'Direct outdoor',    pct:88, color:'#c8b840', suitable:'Tomatoes, Basil, full sun vegetables' },
  { max:Infinity, label:'Full Sun',   sub:'Intense direct',    pct:100,color:'#e8a020', suitable:'Cacti, lavender, drought-tolerant' },
];
function luminanceToLux(avg) { return Math.round(Math.pow(avg/255, 2.2) * 65000); }
function getLuxLevel(lux) { return LUX_LEVELS.find(l => lux <= l.max) || LUX_LEVELS[LUX_LEVELS.length-1]; }

const LightMeterScreen = ({ go }) => {
  const { t } = useT();
  const videoRef = useRef(); const canvasRef = useRef();
  const [lux, setLux] = useState(null); const [err, setErr] = useState(null);
  const [stream, setStream] = useState(null); const [animPct, setAnimPct] = useState(0);
  useEffect(() => {
    let active = true;
    navigator.mediaDevices?.getUserMedia({ video:{ facingMode:{ ideal:'environment' } } })
      .then(s => { if(!active){s.getTracks().forEach(t=>t.stop());return;} setStream(s); if(videoRef.current){videoRef.current.srcObject=s;videoRef.current.play().catch(()=>{});} })
      .catch(e => { if(active) setErr(e.name==='NotAllowedError'?'Camera permission denied':'Camera unavailable — showing simulated reading'); });
    return () => { active=false; };
  }, []);
  useEffect(() => {
    if (!stream) return;
    const id = setInterval(() => {
      const v=videoRef.current, c=canvasRef.current; if(!v||!c||v.readyState<2) return;
      const ctx=c.getContext('2d'); c.width=64; c.height=48; ctx.drawImage(v,0,0,64,48);
      const data=ctx.getImageData(0,0,64,48).data; let total=0;
      for(let i=0;i<data.length;i+=4) total+=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
      setLux(luminanceToLux(total/(data.length/4)));
    }, 600);
    return () => clearInterval(id);
  }, [stream]);
  useEffect(() => { if(lux!==null){const l=getLuxLevel(lux);const id=setTimeout(()=>setAnimPct(l.pct),80);return()=>clearTimeout(id);} }, [lux]);
  useEffect(() => () => stream?.getTracks().forEach(tr=>tr.stop()), [stream]);
  const displayLux = lux ?? 2400;
  const level = getLuxLevel(displayLux);
  return (
    <div className="screen" style={{ background:t.camBg, position:'relative', overflow:'hidden' }}>
      {!err && <video ref={videoRef} autoPlay playsInline muted style={{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity:0.85 }} />}
      {err && <div style={{ position:'absolute', inset:0, background:t.camBg, display:'flex', alignItems:'center', justifyContent:'center' }}><span style={{ color:'rgba(255,255,255,0.3)', fontSize:12, textAlign:'center', padding:'0 30px' }}>{err}</span></div>}
      <canvas ref={canvasRef} style={{ display:'none' }} />
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', justifyContent:'space-between', padding:'12px' }}>
        <div style={{ display:'flex', justifyContent:'space-between' }}>
          <div onClick={() => { stream?.getTracks().forEach(tr=>tr.stop()); go('plants'); }} style={{ width:28, height:28, borderRadius:14, background:'rgba(0,0,0,0.5)', border:'2px solid rgba(255,255,255,0.4)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:13, cursor:'pointer' }}>✕</div>
          <div style={{ width:28 }}></div>
        </div>
        <div style={{ background:'rgba(0,0,0,0.68)', borderRadius:20, padding:'16px 18px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:4 }}>
            <div style={{ fontSize:26, fontWeight:700, color:'#f5f2ee', fontFamily:t.font }}>{level.label}</div>
            <div style={{ fontSize:13, color:'rgba(255,255,255,0.6)', fontFamily:t.font }}>{displayLux.toLocaleString()} lux</div>
          </div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.5)', marginBottom:12, fontFamily:t.font }}>{level.sub}</div>
          <div style={{ height:10, background:'rgba(255,255,255,0.12)', borderRadius:5, overflow:'hidden', marginBottom:6 }}>
            <div style={{ height:'100%', borderRadius:5, width:`${err?45:animPct}%`, background:`linear-gradient(90deg,#3a6a3a,${level.color})`, transition:'width 0.8s cubic-bezier(0.4,0,0.2,1)' }}></div>
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:8, color:'rgba(255,255,255,0.3)', marginBottom:12 }}>
            {LUX_LEVELS.slice(0,-1).map(l => <span key={l.label}>{l.label}</span>)}
          </div>
          <div style={{ background:'rgba(255,255,255,0.1)', borderRadius:10, padding:'8px 10px' }}>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.5)', marginBottom:3 }}>✅ Suitable for</div>
            <div style={{ fontSize:12, color:'#c8d9c0', fontFamily:t.font }}>{level.suitable}</div>
          </div>
        </div>
        <div style={{ display:'flex', justifyContent:'center' }}>
          <div onClick={() => { stream?.getTracks().forEach(tr=>tr.stop()); go('plants'); }} style={{ background:t.accent, borderRadius:999, padding:'10px 32px', border:`2px solid ${t.borderAccent}`, cursor:'pointer' }}>
            <span style={{ color:t.accentText, fontSize:15, fontWeight:700, fontFamily:t.font }}>Done</span>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════
   SETTINGS
   Includes: Unlink Drive (without sign-out)
══════════════════════════════════ */
const SettingsScreen = ({ go, user, onSignOut, onUnlinkDrive }) => {
  const { t, d } = useT();
  const online = useOnline();
  const [unlinkConfirm, setUnlinkConfirm] = useState(false);

  return (
    <div className="screen" style={{ background:t.bg, fontFamily:t.font }}>
      <StatusBar />
      <OfflineBanner />
      <div style={{ padding:`4px 16px 8px`, display:'flex', alignItems:'center', gap:8 }}>
        <div onClick={() => go('plants')} style={{ width:28, height:28, borderRadius:14, background:t.surface, border:`1.5px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:13, color:t.subtext }}>←</div>
        <span style={{ fontSize:d.fs(22), fontWeight:700, color:t.text }}>Settings</span>
      </div>
      <div className="scroll-area" style={{ padding:`0 16px`, paddingBottom:20, display:'flex', flexDirection:'column', gap:12 }}>

        {/* Google Account */}
        <Card green style={{ padding:'12px 14px' }}>
          <div style={{ fontSize:13, fontWeight:700, color:t.accent, marginBottom:10 }}>Google Account</div>
          {user ? (
            <>
              <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                <div style={{ width:36, height:36, borderRadius:18, background:t.accent, display:'flex', alignItems:'center', justifyContent:'center', fontSize:13, fontWeight:700, color:t.accentText, flexShrink:0 }}>{user.avatar}</div>
                <div>
                  <div style={{ fontSize:13, fontWeight:700, color:t.text }}>{user.name}</div>
                  <div style={{ fontSize:11, color:t.subtext }}>{user.email}</div>
                </div>
              </div>

              {/* Drive toggle row */}
              <div style={{ borderTop:`1px solid ${t.border}`, paddingTop:10, marginBottom:8 }}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
                  <div>
                    <div style={{ fontSize:12, color:t.accent, fontWeight:600 }}>☁️ Google Drive sync</div>
                    <div style={{ fontSize:10, color:t.subtextLight }}>
                      {user.driveConnected
                        ? (online ? 'Active — syncing to appdata folder' : 'Offline — will sync when reconnected')
                        : 'Disconnected — plants saved locally only'}
                    </div>
                  </div>
                  <div style={{ width:32, height:18, background: user.driveConnected ? t.accent : t.border, borderRadius:9, flexShrink:0 }}></div>
                </div>

                {/* Unlink Drive (without sign-out) */}
                {user.driveConnected && !unlinkConfirm && (
                  <div onClick={() => setUnlinkConfirm(true)}
                    style={{ fontSize:12, color:t.subtext, cursor:'pointer', textDecoration:'underline', marginTop:4 }}>
                    Unlink Google Drive only
                  </div>
                )}
                {unlinkConfirm && (
                  <div style={{ background:t.dangerLight, border:`2px solid ${t.dangerBorder}`, borderRadius:t.radius, padding:'10px 12px', marginTop:6 }}>
                    <div style={{ fontSize:12, color:t.danger, marginBottom:8, fontFamily:t.font }}>
                      Unlink Drive? Your plants will be kept locally. You'll stay signed in.
                    </div>
                    <div style={{ display:'flex', gap:8 }}>
                      <div onClick={() => { onUnlinkDrive(); setUnlinkConfirm(false); }}
                        style={{ flex:1, height:34, borderRadius:t.radiusPill, background:t.danger, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, fontWeight:700, color:'#fff', cursor:'pointer', fontFamily:t.font }}>
                        Unlink Drive
                      </div>
                      <div onClick={() => setUnlinkConfirm(false)}
                        style={{ flex:1, height:34, borderRadius:t.radiusPill, border:`2px solid ${t.border}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:12, color:t.subtext, cursor:'pointer', fontFamily:t.font }}>
                        Cancel
                      </div>
                    </div>
                  </div>
                )}
              </div>

              <div onClick={onSignOut}
                style={{ textAlign:'center', fontSize:12, color:t.danger, cursor:'pointer', textDecoration:'underline', borderTop:`1px solid ${t.border}`, paddingTop:8 }}>
                Sign out completely
              </div>
            </>
          ) : (
            <div>
              <div style={{ fontSize:12, color:t.subtext, marginBottom:8 }}>Sign in to sync your plants across devices and back up to Google Drive.</div>
              <Btn style={{ height:40 }} onClick={() => go('google-signin')}>Sign in with Google</Btn>
            </div>
          )}
        </Card>

        <Card green style={{ padding:'12px 14px' }}>
          <div style={{ fontSize:13, fontWeight:700, color:t.accent, marginBottom:8 }}>📍 Location &amp; Weather</div>
          <div style={{ background:t.bg, border:`2px solid ${t.border}`, borderRadius:t.radius, padding:'8px 12px', marginBottom:8, display:'flex', justifyContent:'space-between', alignItems:'center', cursor:'pointer' }}>
            <span style={{ fontSize:14, color:t.text }}>Austin, TX</span><span style={{ fontSize:12, color:t.accent }}>Edit ›</span>
          </div>
          <div style={{ background:t.accent, borderRadius:8, padding:'6px 10px', fontSize:12, color:t.accentText, textAlign:'center', marginBottom:8 }}>🌤 72°F · Partly Cloudy · Good watering day</div>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ fontSize:12, color:t.accent }}>Smart watering based on weather</span>
            <div style={{ width:32, height:18, background:t.accent, borderRadius:9, border:`2px solid ${t.accent}` }}></div>
          </div>
        </Card>

        <Card style={{ padding:'12px 14px' }}>
          <div style={{ fontSize:13, fontWeight:700, color:t.text, marginBottom:8 }}>🔔 Notifications</div>
          {[{ label:'Care reminders', on:true }, { label:'Weather alerts', on:false }, { label:'Journal prompts', on:true }].map(n => (
            <div key={n.label} style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'6px 0', borderBottom:`1px solid ${t.border}` }}>
              <span style={{ fontSize:13, color:t.text }}>{n.label}</span>
              <div style={{ width:32, height:18, background:n.on?t.accent:t.border, borderRadius:9, transition:'all 0.2s' }}></div>
            </div>
          ))}
        </Card>
        <Card style={{ padding:'12px 14px' }}>
          <div style={{ fontSize:13, fontWeight:700, color:t.text, marginBottom:8 }}>🌿 Preferences</div>
          {['Units: Imperial','Dark mode: Auto','Language: English'].map(item => (
            <div key={item} style={{ display:'flex', justifyContent:'space-between', padding:'6px 0', borderBottom:`1px solid ${t.border}`, fontSize:13, color:t.subtext, cursor:'pointer' }}>
              <span>{item}</span><span style={{ color:t.subtextLight }}>›</span>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
};

/* ══════════════════════════════════
   ROOT + TWEAKS
══════════════════════════════════ */
const SCREEN_LABELS = {
  onboarding:'Onboarding', 'google-signup':'Google Sign-Up', 'google-signin':'Google Sign-In',
  'onboarding-wizard':'Onboarding Wizard', 'plants-loading':'Plants Loading',
  plants:'My Plants', schedule:'Schedule', detail:'Plant Detail',
  identify:'Identify', 'new-plant-setup':'New Plant Setup',
  dr:'Dr. Plant', light:'Light Meter', settings:'Settings',
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "Earthy Sketch",
  "density": 0,
  "voice": "Casual"
}/*EDITMODE-END*/;

const App = () => {
  const savedUser = (() => { try { return JSON.parse(localStorage.getItem('gt_user')); } catch(e){ return null; } })();
  const [user, setUser] = useState(savedUser);
  const [screen, setScreen] = useState(() => {
    // Returning users with existing plant data skip straight to plants
    if (savedUser && localStorage.getItem('gt_drive_fresh')) return 'plants';
    if (savedUser) return 'plants';
    return 'onboarding';
  });

  const go = (s) => setScreen(s);

  const handleAuth = (u) => {
    setUser(u);
  };

  const handleRestoreComplete = (driveData) => {
    // Could merge driveData.plants into local state here
    console.log('Restored', driveData?.plants?.length, 'plants from Drive');
  };

  const handleSignOut = async () => {
    if (user?.accessToken) await Auth.signOut(user.accessToken);
    DriveService.clearToken();
    localStorage.removeItem('gt_user');
    localStorage.removeItem('gt_drive_fresh');
    setUser(null);
    go('onboarding');
  };

  const handleUnlinkDrive = async () => {
    await DriveService.unlinkDrive();
    const updated = { ...user, driveConnected: false, accessToken: null };
    setUser(updated);
    localStorage.setItem('gt_user', JSON.stringify(updated));
  };

  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = THEMES[tweaks.theme] || THEMES['Earthy Sketch'];
  const voice = VOICE[tweaks.voice] || VOICE.Casual;
  const d = useDensity(tweaks.density);
  const ctx = { t: theme, voice, d };

  const renderScreen = () => {
    switch(screen) {
      case 'onboarding':        return <OnboardingScreen go={go} />;
      case 'google-signup':     return <GoogleSignInScreen go={go} onAuth={handleAuth} mode="signup" />;
      case 'google-signin':     return <GoogleSignInScreen go={go} onAuth={handleAuth} mode="signin" />;
      case 'onboarding-wizard': return <OnboardingWizard go={go} user={user} />;
      case 'plants-loading':    return <PlantsLoadingScreen go={go} user={user} onRestoreComplete={handleRestoreComplete} />;
      case 'plants':            return <MyPlantsScreen go={go} user={user} />;
      case 'schedule':          return <ScheduleScreen go={go} />;
      case 'detail':            return <PlantDetailScreen go={go} />;
      case 'identify':          return <IdentifyScreen go={go} />;
      case 'new-plant-setup':   return <NewPlantSetupScreen go={go} />;
      case 'dr':                return <DrScreen go={go} />;
      case 'light':             return <LightMeterScreen go={go} />;
      case 'settings':          return <SettingsScreen go={go} user={user} onSignOut={handleSignOut} onUnlinkDrive={handleUnlinkDrive} />;
      default:                  return <MyPlantsScreen go={go} user={user} />;
    }
  };

  return (
    <ThemeCtx.Provider value={ctx}>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:16, padding:'32px 16px', fontFamily: theme.font }}>
        <div style={{ color:'#666', fontSize:13, fontFamily:'Caveat,cursive' }}>{SCREEN_LABELS[screen]||screen}</div>
        <div className="phone" style={{ background: theme.bg }}>
          <div className="phone-notch"></div>
          {renderScreen()}
        </div>
        <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'center', maxWidth:420 }}>
          {Object.entries(SCREEN_LABELS).map(([k,v]) => (
            <div key={k} onClick={() => go(k)}
              style={{ padding:'4px 10px', borderRadius:999, cursor:'pointer',
                background: screen===k?'#3d5a3e':'#2e2e2e',
                color: screen===k?'#f5f2ee':'#888',
                border:`1.5px solid ${screen===k?'#5a7a5b':'#444'}`,
                fontSize:12, fontFamily:'Caveat,cursive' }}>{v}</div>
          ))}
        </div>
        <div style={{ fontSize:10, color:'#555', fontFamily:'monospace', textAlign:'center' }}>
          {GOOGLE_CLIENT_ID==='DEMO' ? '⚠ Demo mode — OAuth simulated' : '✓ Real OAuth configured'}
        </div>
      </div>

      <TweaksPanel>
        <TweakSection title="Visual Theme">
          <TweakRadio id="theme" label="Theme" options={['Earthy Sketch','Clean Minimal','Dark Botanical']}
            value={tweaks.theme} onChange={v => setTweak('theme', v)} />
        </TweakSection>
        <TweakSection title="Density">
          <TweakSlider id="density" label="Density" min={0} max={2} step={1}
            value={tweaks.density} onChange={v => setTweak('density', v)}
            formatValue={v => ['Airy','Normal','Compact'][v]} />
        </TweakSection>
        <TweakSection title="Tone of Voice">
          <TweakRadio id="voice" label="Copy style" options={['Casual','Scientific']}
            value={tweaks.voice} onChange={v => setTweak('voice', v)} />
        </TweakSection>
      </TweaksPanel>
    </ThemeCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
