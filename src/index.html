const DriveAPI = {
  async listFiles(token) {
    const res = await fetch(
      'https://www.googleapis.com/drive/v3/files?' +
        new URLSearchParams({ spaces: 'appDataFolder', fields: 'files(id,name,modifiedTime)' }),
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) throw new Error('Drive list failed');
    return res.json();
  },
  async readFile(token, fileId) {
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!res.ok) throw new Error('Drive read failed');
    return res.json();
  },
  async createFile(token, name, data) {
    const meta = { name, parents: ['appDataFolder'], mimeType: 'application/json' };
    const body = new FormData();
    body.append('metadata', new Blob([JSON.stringify(meta)], { type: 'application/json' }));
    body.append('file', new Blob([JSON.stringify(data)], { type: 'application/json' }));
    const res = await fetch(
      'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
      { method: 'POST', headers: { Authorization: `Bearer ${token}` }, body }
    );
    if (!res.ok) throw new Error('Drive create failed');
    return res.json();
  },
  async updateFile(token, fileId, data) {
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
      {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }
    );
    if (!res.ok) throw new Error('Drive update failed');
    return res.json();
  },
};

/* ══════════════════════════════════
   SCHEDULE UTILS
══════════════════════════════════ */
function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d;
}

function daysUntil(date) {
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(date); d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function fmtDate(date) {
  return new Date(date).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function computeTasks(plants) {
  const tasks = [];
  for (const p of plants) {
    const add = (icon, type, last, freq) => {
      if (!last || !freq) return;
      const next = addDays(last, freq);
      const du = daysUntil(next);
      if (du <= 30) tasks.push({ plantId:p.id, plant:p.name, icon, type, date:next, daysUntil:du, urgent: du < 0 });
    };
    add('💧', VOICE.water,      p.lastWatered,    p.waterFreq);
    add('🌿', VOICE.fertilize,  p.lastFertilized, p.fertilizeFreq);
    add('✂️', VOICE.prune,      p.lastPruned,     p.pruneFreq);
  }
  return tasks.sort((a, b) => a.date - b.date);
}

function groupTasks(tasks) {
  const bucket = (du) => {
    if (du < 0)   return 'Overdue';
    if (du <= 6)  return 'This week';
    if (du <= 13) return 'Next week';
    return 'Later this month';
  };
  const order = ['Overdue','This week','Next week','Later this month'];
  const map = {};
  for (const task of tasks) {
    const b = bucket(task.daysUntil);
    if (!map[b]) map[b] = {};
    const dk = fmtDate(task.date);
    if (!map[b][dk]) map[b][dk] = [];
    map[b][dk].push(task);
  }
  return order
    .filter(k => map[k])
    .map(label => ({ label, days: Object.entries(map[label]).map(([date, tasks]) => ({ date, tasks })) }));
}

const SyncBadge = ({ status, isOnline }) => {
  if (!isOnline) return <span style={{ fontSize:10, color:T.warn, fontFamily:T.font }}>○ Offline</span>;
  if (status === 'loading' || status === 'syncing')
    return <span style={{ fontSize:10, color:T.subtext, fontFamily:T.font }}>↻ Syncing…</span>;
  if (status === 'synced') return <span style={{ fontSize:10, color:T.accent, fontFamily:T.font }}>✓ Synced</span>;
  if (status === 'error')  return <span style={{ fontSize:10, color:T.danger, fontFamily:T.font }}>! Sync error</span>;
  return null;
};

const PlantDetailScreen = () => {
  const { go, selectedPlant, completeTask, progressPhotos, addProgressPhoto, setHeroPhoto, heroPhotos } = useApp();
  const heroRef = useRef(); const progressRef = useRef();
  if (!selectedPlant) {
    return <div className="screen" style={{ background:T.bg, display:'flex', alignItems:'center', justifyContent:'center' }}><span style={{ color:T.subtext }}>No plant selected</span></div>;
  }
  const p = selectedPlant;
  const heroPhoto = heroPhotos?.[p.id];
  const photos = progressPhotos?.[p.id] || [];

  const careDef = (icon, label, last, freq) => {
    if (!last || !freq) return null;
    const next = addDays(last, freq);
    const du = daysUntil(next);
    const lastDays = daysUntil(new Date(last));
    const when = du < 0 ? `${Math.abs(du)}d overdue` : du === 0 ? 'Today' : `in ${du} days`;
    return { icon, label, when, last: `${Math.abs(lastDays)} days ago`, urgent: du < 0 };
  };
  const cares = [
    careDef('💧', VOICE.regularWatering, p.lastWatered,    p.waterFreq),
    careDef('🌿', VOICE.fertilize,        p.lastFertilized, p.fertilizeFreq),
    careDef('✂️', VOICE.prune,            p.lastPruned,     p.pruneFreq),
  ].filter(Boolean);

  const tasks = computeTasks([p]).slice(0, 4);

  const onHeroFile = e => { const f = e.target.files?.[0]; if (f) setHeroPhoto(p.id, URL.createObjectURL(f)); };
  const onProgressFile = e => { const f = e.target.files?.[0]; if (f) addProgressPhoto(p.id, URL.createObjectURL(f)); };

  return (
    <div className="screen" style={{ background:T.bg, fontFamily:T.font }}>
      <div style={{ position:'relative', height:200, flexShrink:0 }}>
        {heroPhoto
          ? <img src={heroPhoto} alt={p.name} style={{ width:'100%', height:200, objectFit:'cover' }} />
          : <ImgBlock h={200} dark label={`${p.name} photo`} style={{ borderRadius:0, border:'none', width:'100%' }} />}

          <span style={{ fontSize:12 }}>📷</span><span style={{ fontSize:11, color:'#fff', fontFamily:T.font }}>Change photo</span>
        </div>
        <input ref={heroRef} type="file" accept="image/*" style={{ display:'none' }} onChange={onHeroFile} />
        <div style={{ position:'absolute', top:10, left:12 }}>
          <div onClick={() => go('plants')} style={{ width:28, height:28, borderRadius:14, background:'rgba(0,0,0,0.35)', border:'1.5px solid rgba(255,255,255,0.4)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:13, color:'#fff' }}>←</div>
        </div>
        <div style={{ position:'absolute', bottom:10, left:12, display:'flex', gap:6 }}>
          <Pill label={`🏠 ${p.room}`} /><Pill label={`🌿 ${VOICE.healthy}`} />
        </div>
      </div>
      <div className="scroll-area" style={{ padding:'10px 16px', paddingBottom:66 }}>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:2 }}>
          <span style={{ fontSize:22, fontWeight:700, color:T.text }}>{p.name}</span>
        </div>
        <div style={{ fontSize:12, color:T.subtext, marginBottom:14 }}>{p.sci}</div>
        <div style={{ display:'flex', justifyContent:'space-around', marginBottom:16 }}>
          {cares.map(c => (
            <div key={c.label} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4, width:90 }}>
              <div style={{ width:56, height:56, borderRadius:28, border:`3px solid ${c.urgent?T.danger:T.borderAccent}`, background:T.surface, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22 }}>{c.icon}</div>
              <div style={{ fontSize:10, color:T.text, textAlign:'center', fontWeight:700, fontFamily:T.font }}>{c.label}</div>

            <div key={i} style={{ display:'flex', alignItems:'center', gap:10, padding:'6px 0', borderBottom: i < tasks.length-1 ? `1px solid ${T.border}` : 'none' }}>

              <span style={{ fontSize:22 }}>📷</span>
              <span style={{ fontSize:10, color:T.accent, textAlign:'center', fontFamily:T.font }}>Add photo</span>
            </div>
            <input ref={progressRef} type="file" accept="image/*" style={{ display:'none' }} onChange={onProgressFile} />

const LUX_LEVELS = [
  { max:50,    label:'Dark',           sub:'Very little light', pct:5,   color:'#6a7a6a', suitable:'Cast iron plant, ZZ Plant' },
  { max:200,   label:'Low Light',      sub:'Shade tolerant',    pct:22,  color:'#5a8a5a', suitable:'Pothos, Snake Plant, Peace Lily' },
  { max:1000,  label:'Indirect Light', sub:'Bright room',       pct:45,  color:'#4a9a4a', suitable:'Monstera, Fiddle Leaf, Philodendron' },
  { max:5000,  label:'Part Sun',       sub:'A few hours sun',   pct:68,  color:'#7ab83a', suitable:'Herbs, succulents, flowering plants' },
  { max:20000, label:'Bright Sun',     sub:'Direct outdoor',    pct:88,  color:'#c8b840', suitable:'Tomatoes, Basil, full sun vegetables' },
  { max:Infinity, label:'Full Sun',    sub:'Intense direct',    pct:100, color:'#e8a020', suitable:'Cacti, lavender, drought-tolerant' },
];
const luxFromAvg = (avg) => Math.round(Math.pow(avg/255, 2.2) * 65000);
const getLevel = (lux) => LUX_LEVELS.find(l => lux <= l.max) || LUX_LEVELS[LUX_LEVELS.length-1];

const LightMeterScreen = () => {
  const { go } = useApp();
  const videoRef = useRef(); const canvasRef = useRef();
  const [lux, setLux] = useState(null);
  const [err, setErr] = useState(null);
  const [stream, setStream] = useState(null);
  const [animPct, setAnimPct] = useState(0);

  useEffect(() => {
    let active = true;
    navigator.mediaDevices?.getUserMedia({ video:{ facingMode:{ ideal:'environment' } } })
      .then(s => {
        if (!active) { s.getTracks().forEach(t=>t.stop()); return; }
        setStream(s);
        if (videoRef.current) { videoRef.current.srcObject = s; videoRef.current.play().catch(()=>{}); }
      })
      .catch(e => { if (active) setErr(e.name==='NotAllowedError'?'Camera permission denied':'Camera unavailable — showing simulated reading'); });
    return () => { active = false; };
  }, []);

  useEffect(() => {
    if (!stream) return;
    const id = setInterval(() => {
      const v = videoRef.current, c = canvasRef.current;
      if (!v || !c || v.readyState < 2) return;
      const ctx = c.getContext('2d');
      c.width = 64; c.height = 48; ctx.drawImage(v, 0, 0, 64, 48);
      const data = ctx.getImageData(0, 0, 64, 48).data;
      let total = 0;
      for (let i=0; i<data.length; i+=4) total += 0.299*data[i] + 0.587*data[i+1] + 0.114*data[i+2];
      setLux(luxFromAvg(total / (data.length/4)));
    }, 600);
    return () => clearInterval(id);
  }, [stream]);

  useEffect(() => { if (lux !== null) { const t = setTimeout(() => setAnimPct(getLevel(lux).pct), 80); return () => clearTimeout(t); } }, [lux]);
  useEffect(() => () => stream?.getTracks().forEach(tr => tr.stop()), [stream]);

  const displayLux = lux ?? 2400;
  const level = getLevel(displayLux);
  const stop = () => { stream?.getTracks().forEach(tr => tr.stop()); go('plants'); };

  return (
    <div className="screen" style={{ background:T.camBg, position:'relative', overflow:'hidden' }}>
      {!err && <video ref={videoRef} className="camera-video" autoPlay playsInline muted style={{ opacity:0.85 }} />}
      {err && <div style={{ position:'absolute', inset:0, background:T.camBg, display:'flex', alignItems:'center', justifyContent:'center' }}><span style={{ color:'rgba(255,255,255,0.4)', fontSize:12, textAlign:'center', padding:'0 30px', fontFamily:T.font }}>{err}</span></div>}
      <canvas ref={canvasRef} className="camera-canvas" />
      <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', justifyContent:'space-between', padding:12 }}>
        <div style={{ display:'flex', justifyContent:'space-between' }}>
          <div onClick={stop} style={{ width:28, height:28, borderRadius:14, background:'rgba(0,0,0,0.5)', border:'2px solid rgba(255,255,255,0.4)', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontSize:13, cursor:'pointer' }}>✕</div>
          <div style={{ width:28 }} />
        </div>
        <div style={{ background:'rgba(0,0,0,0.68)', borderRadius:20, padding:'16px 18px' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:4 }}>
            <div style={{ fontSize:26, fontWeight:700, color:'#f5f2ee', fontFamily:T.font }}>{level.label}</div>
            <div style={{ fontSize:13, color:'rgba(255,255,255,0.6)', fontFamily:T.font }}>{displayLux.toLocaleString()} lux</div>
          </div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.5)', marginBottom:12, fontFamily:T.font }}>{level.sub}</div>
          <div style={{ height:10, background:'rgba(255,255,255,0.12)', borderRadius:5, overflow:'hidden', marginBottom:6 }}>
            <div style={{ height:'100%', borderRadius:5, width:`${err?45:animPct}%`, background:`linear-gradient(90deg,#3a6a3a,${level.color})`, transition:'width 0.8s cubic-bezier(0.4,0,0.2,1)' }} />
          </div>
          <div style={{ display:'flex', justifyContent:'space-between', fontSize:8, color:'rgba(255,255,255,0.3)', marginBottom:12 }}>
            {LUX_LEVELS.slice(0,-1).map(l => <span key={l.label}>{l.label}</span>)}
          </div>
          <div style={{ background:'rgba(255,255,255,0.1)', borderRadius:10, padding:'8px 10px' }}>
            <div style={{ fontSize:10, color:'rgba(255,255,255,0.5)', marginBottom:3, fontFamily:T.font }}>✅ Suitable for</div>
            <div style={{ fontSize:12, color:'#c8d9c0', fontFamily:T.font }}>{level.suitable}</div>
          </div>
        </div>
        <div style={{ display:'flex', justifyContent:'center' }}>
          <div onClick={stop} style={{ background:T.accent, borderRadius:999, padding:'10px 32px', border:`2px solid ${T.borderAccent}`, cursor:'pointer' }}>
            <span style={{ color:T.accentText, fontSize:15, fontWeight:700, fontFamily:T.font }}>Done</span>
          </div>
        </div>
      </div>
    </div>
  );
};

const todayStr = () => new Date().toISOString().split('T')[0];

const App = () => {
  const savedUser = (() => { try { return JSON.parse(localStorage.getItem('gt_user')); } catch { return null; } })();
  const savedDriveId = localStorage.getItem('gt_drive_id');

  const [screen, setScreen] = useState(savedUser ? 'plants' : 'onboarding');
  const [user, setUser] = useState(savedUser);
  const [data, setData] = useState(() => { try { return JSON.parse(localStorage.getItem('gt_data')) || DEFAULT_DATA; } catch { return DEFAULT_DATA; } });
  const [selectedPlantId, setSelectedPlantId] = useState(null);
  const [accessToken, setAccessToken] = useState(null);
  const [driveFileId, setDriveFileId] = useState(savedDriveId);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [pendingMode, setPendingMode] = useState(null);
  const [pendingRestore, setPendingRestore] = useState(null);
  const [isOnline, setIsOnline] = useState(navigator.onLine);

  const tokenClientRef = useRef(null);
  const saveTimerRef = useRef(null);

  // Online/offline listener
  useEffect(() => {
    const on = () => setIsOnline(true), off = () => setIsOnline(false);
    window.addEventListener('online', on); window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  // Load Google Identity Services
  useEffect(() => {
    if (IS_DEMO) return;
    const init = () => {
      if (!window.google?.accounts?.oauth2 || tokenClientRef.current) return;
      tokenClientRef.current = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: DRIVE_SCOPES,
        callback: handleAuthResponse,
      });
    };
    if (window.google?.accounts?.oauth2) { init(); return; }
    const existing = document.querySelector('script[src="https://accounts.google.com/gsi/client"]');
    if (existing) { const i = setInterval(() => { if (window.google?.accounts?.oauth2) { clearInterval(i); init(); } }, 100); return; }
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.async = true; script.defer = true;
    script.onload = () => { const i = setInterval(() => { if (window.google?.accounts?.oauth2) { clearInterval(i); init(); } }, 100); };
    document.head.appendChild(script);
    // eslint-disable-next-line
  }, []);

  // Persist data + debounced Drive sync
  useEffect(() => {
    localStorage.setItem('gt_data', JSON.stringify(data));
    if (!accessToken || !driveFileId || !isOnline) return;
    clearTimeout(saveTimerRef.current);
    setSyncStatus('syncing');
    saveTimerRef.current = setTimeout(async () => {
      try { await DriveAPI.updateFile(accessToken, driveFileId, data); setSyncStatus('synced'); }
      catch { setSyncStatus('error'); }
    }, 2000);
    return () => clearTimeout(saveTimerRef.current);
  }, [data, accessToken, driveFileId, isOnline]);

  const go = (s) => setScreen(s);

  const handleAuthResponse = async (response) => {
    if (response?.error) { setSyncStatus('error'); return; }
    const token = response.access_token;
    setAccessToken(token);
    try {
      const profileRes = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: `Bearer ${token}` } });
      const profile = await profileRes.json();
      const u = {
        name: profile.name || profile.email,
        email: profile.email,
        avatar: (profile.name || profile.email || 'U').split(/[ @]/).map(n=>n[0]).join('').slice(0,2).toUpperCase(),
        picture: profile.picture, driveConnected: true,
      };
      setUser(u);
      localStorage.setItem('gt_user', JSON.stringify(u));

      setSyncStatus('loading');
      try {
        const { files } = await DriveAPI.listFiles(token);
        const existing = files?.find(f => f.name === DATA_FILE_NAME);
        if (existing) {
          setDriveFileId(existing.id);
          localStorage.setItem('gt_drive_id', existing.id);
          const drive = await DriveAPI.readFile(token, existing.id);
          if (drive?.plants?.length > 0) {
            setPendingRestore({ data: drive });
            setScreen('restore-confirm');
            return;
          }
        }
        // Create new file with current local data
        const created = await DriveAPI.createFile(token, DATA_FILE_NAME, data);
        setDriveFileId(created.id);
        localStorage.setItem('gt_drive_id', created.id);
        setSyncStatus('synced');
      } catch { setSyncStatus('error'); }
      // For sign-in with no Drive data → still go to plants (skip wizard)
      setScreen(pendingMode === 'signin' ? 'plants' : 'onboarding-wizard');
    } catch { setSyncStatus('error'); }
  };

  const requestSignIn = (mode) => {
    setPendingMode(mode);
    if (IS_DEMO) {
      setTimeout(() => {
        const u = { name:'Alex Johnson', email:'alex.johnson@gmail.com', avatar:'AJ', driveConnected:false };
        setUser(u);
        localStorage.setItem('gt_user', JSON.stringify(u));
        setScreen(mode === 'signin' ? 'plants' : 'onboarding-wizard');
      }, 1000);
      return;
    }
    if (tokenClientRef.current) tokenClientRef.current.requestAccessToken();
    else setSyncStatus('error');
  };

  const signOut = () => {
    if (accessToken && window.google?.accounts?.oauth2) {
      try { google.accounts.oauth2.revoke(accessToken, () => {}); } catch {}
    }
    localStorage.removeItem('gt_user');
    localStorage.removeItem('gt_drive_id');
    setUser(null); setAccessToken(null); setDriveFileId(null); setSyncStatus('idle');
    setScreen('onboarding');
  };

  const setDriveSync = (on) => {
    if (!user) return;
    const u = { ...user, driveConnected: on };
    setUser(u);
    localStorage.setItem('gt_user', JSON.stringify(u));
  };

  const syncNow = async () => {
    if (!accessToken) { requestSignIn('signin'); return; }
    if (!driveFileId) return;
    setSyncStatus('syncing');
    try { await DriveAPI.updateFile(accessToken, driveFileId, data); setSyncStatus('synced'); }
    catch { setSyncStatus('error'); }
  };

  const restoreFromDrive = () => {
    if (pendingRestore) setData(pendingRestore.data);
    setPendingRestore(null);
    setSyncStatus('synced');
    setScreen('plants');
  };

  const keepLocal = async () => {
    setPendingRestore(null);
    if (accessToken && driveFileId) {
      setSyncStatus('syncing');
      try { await DriveAPI.updateFile(accessToken, driveFileId, data); setSyncStatus('synced'); }
      catch { setSyncStatus('error'); }
    }
    setScreen('plants');
  };

  const completeTask = (plantId, icon) => {
    const field = icon === '💧' ? 'lastWatered' : icon === '🌿' ? 'lastFertilized' : icon === '✂️' ? 'lastPruned' : null;
    if (!field) return;
    setData(d => ({ ...d, plants: d.plants.map(p => p.id === plantId ? { ...p, [field]: todayStr() } : p) }));
  };

  const addPlant = (p) => {
    const id = 'p' + Date.now();
    setData(d => ({ ...d, plants: [...d.plants, { id, ...p }] }));
    setSelectedPlantId(id);
  };

  const setHeroPhoto = (plantId, src) =>
    setData(d => ({ ...d, heroPhotos: { ...(d.heroPhotos||{}), [plantId]: src } }));

  const addProgressPhoto = (plantId, src) =>
    setData(d => ({
      ...d,
      progressPhotos: {
        ...(d.progressPhotos||{}),
        [plantId]: [ ...((d.progressPhotos||{})[plantId] || []), { src, label: fmtDate(new Date()), note: 'New photo' } ],
      },
    }));

  const selectedPlant = data.plants.find(p => p.id === selectedPlantId);

  const ctx = {
    go, user, plants: data.plants, syncStatus, isOnline,
    requestSignIn, signOut, syncNow, setDriveSync,
    selectedPlantId, setSelectedPlantId, selectedPlant,
    completeTask, addPlant, setHeroPhoto, addProgressPhoto,
    progressPhotos: data.progressPhotos || {}, heroPhotos: data.heroPhotos || {},
    pendingRestore, restoreFromDrive, keepLocal,
  };

  const Cmp = SCREENS[screen] || OnboardingScreen;

  return (
    <AppCtx.Provider value={ctx}>
      <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, padding:'24px 16px' }}>
        <div className="phone">
          <div className="phone-notch"></div>
          <Cmp />
        </div>
        {IS_DEMO && (
          <div style={{ color:'#666', fontSize:11, fontFamily:'Caveat,cursive', textAlign:'center', maxWidth:320 }}>
            Demo mode — set <code style={{ color:'#999' }}>GOOGLE_CLIENT_ID</code> in the source to enable real Google sign-in &amp; Drive sync.
          </div>
        )}
      </div>
    </AppCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
